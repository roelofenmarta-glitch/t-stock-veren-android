name: Android APK V10.2.1

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Broncode ophalen
        uses: actions/checkout@v4

      - name: Java 17 instellen
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 8.7 instellen
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Release-keystore voorbereiden
        if: env.KEYSTORE_B64 != ''
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/tstock-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/tstock-release.jks" >> "$GITHUB_ENV"

      - name: Oude WebView-bestanden opruimen
        run: |
          # Deze bestanden kunnen zijn blijven staan wanneer V10.2 over V10.1
          # in een bestaande GitHub-repository is geupload. De native Compose-app
          # gebruikt ze niet en Android resource linking faalt er anders op.
          rm -rf android/app/src/main/res/layout
          rm -rf android/app/src/main/res/menu
          rm -rf android/app/src/main/res/xml
          rm -rf android/app/src/main/res/values-night
          rm -f android/app/src/main/res/drawable/ic_refresh.xml
          rm -f android/app/src/main/res/drawable/ic_scan.xml
          rm -f android/app/src/main/res/drawable/ic_server.xml

      - name: APK bouwen
        run: |
          if [ -n "${ANDROID_KEYSTORE_PATH:-}" ]; then
            gradle -p android --no-daemon clean assembleRelease
            cp android/app/build/outputs/apk/release/app-release.apk android/t-stock-veren-v10.2.1.apk
          else
            echo "Geen signing secrets gevonden: debug APK voor test wordt gebouwd."
            gradle -p android --no-daemon clean assembleDebug
            cp android/app/build/outputs/apk/debug/app-debug.apk android/t-stock-veren-v10.2.1-debug.apk
          fi

      - name: APK publiceren als artifact
        uses: actions/upload-artifact@v4
        with:
          name: T-Stock-Veren-V10.2.1-Android
          path: android/t-stock-veren-v10.2.1*.apk
          retention-days: 30
