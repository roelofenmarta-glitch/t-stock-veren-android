name: Android APK V10.5.4 STABLE

on:
  workflow_dispatch:

jobs:
  build-stable-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Release-keystore verplicht controleren
        run: |
          if [ -z "$KEYSTORE_B64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "FOUT: stable APK wordt alleen met vaste signing secrets gebouwd."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/tstock-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/tstock-release.jks" >> "$GITHUB_ENV"
      - name: Oude WebView-bestanden opruimen
        run: bash scripts/cleanup-old-webview-files.sh
      - name: Stable productie-app bouwen
        run: |
          gradle -p android --no-daemon clean assembleProductionRelease
          cp android/app/build/outputs/apk/production/release/app-production-release.apk android/t-stock-veren-v10.5.4-stable.apk
      - uses: actions/upload-artifact@v4
        with:
          name: T-Stock-Veren-V10.5.4-STABLE
          path: android/t-stock-veren-v10.5.4-stable.apk
          retention-days: 90
