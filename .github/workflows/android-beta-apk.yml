name: Android APK V10.5.1 BETA

on:
  workflow_dispatch:

jobs:
  build-beta-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Release-keystore voorbereiden
        if: env.KEYSTORE_B64 != ''
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/tstock-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/tstock-release.jks" >> "$GITHUB_ENV"
      - name: Oude WebView-bestanden opruimen
        run: bash scripts/cleanup-old-webview-files.sh
      - name: Beta-app bouwen
        run: |
          if [ -n "${ANDROID_KEYSTORE_PATH:-}" ]; then
            gradle -p android --no-daemon clean assembleBetaRelease
            cp android/app/build/outputs/apk/beta/release/app-beta-release.apk android/t-stock-veren-v10.5.1-beta.apk
          else
            echo "Geen signing secrets: beta-debug APK voor interne test wordt gebouwd."
            gradle -p android --no-daemon clean assembleBetaDebug
            cp android/app/build/outputs/apk/beta/debug/app-beta-debug.apk android/t-stock-veren-v10.5.1-beta-debug.apk
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: T-Stock-Veren-V10.5.1-BETA
          path: android/t-stock-veren-v10.5.1-beta*.apk
          retention-days: 30
